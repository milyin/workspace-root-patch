name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from Cargo.toml, without the v prefix
        required: true
        type: string

concurrency:
  group: crates-io-publication
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_VERSION: ${{ inputs.version }}

jobs:
  publish:
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Validate release request
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "Releases must be dispatched from main, not $GITHUB_REF" >&2
            exit 1
          }
          case "$RELEASE_VERSION" in
            ''|*[!0-9.]*|.*|*.)
              echo "Invalid release version: $RELEASE_VERSION" >&2
              exit 1
              ;;
          esac
          manifest_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "project-root-patch") | .version')
          test "$manifest_version" = "$RELEASE_VERSION" || {
            echo "Cargo.toml contains $manifest_version, not $RELEASE_VERSION" >&2
            exit 1
          }

      - name: Run release checks
        run: |
          cargo +stable fmt --all --check
          cargo +stable clippy --all-targets -- -D warnings
          RUSTDOCFLAGS='-D warnings' cargo +stable doc --no-deps
          cargo +stable test --all-targets --locked
          cargo +stable package --locked
          cargo +stable test --manifest-path "target/package/project-root-patch-$RELEASE_VERSION/Cargo.toml" --all-targets --locked

      - name: Inspect crates.io state
        id: registry
        run: |
          archive=$(mktemp)
          url="https://crates.io/api/v1/crates/project-root-patch/$RELEASE_VERSION/download"
          status=$(curl --silent --show-error --location --write-out '%{http_code}' "$url" --output "$archive")
          case "$status" in
            200)
              published_sha=$(tar -xOf "$archive" "project-root-patch-$RELEASE_VERSION/.cargo_vcs_info.json" | jq -r .git.sha1)
              test "$published_sha" = "$GITHUB_SHA" || {
                echo "Version $RELEASE_VERSION is already published from $published_sha" >&2
                exit 1
              }
              needs_publish=false
              ;;
            404)
              needs_publish=true
              ;;
            *)
              echo "crates.io returned HTTP $status" >&2
              exit 1
              ;;
          esac
          echo "needs_publish=$needs_publish" >> "$GITHUB_OUTPUT"

          tag="v$RELEASE_VERSION"
          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            test "$needs_publish" = false || {
              echo "$tag exists before publication" >&2
              exit 1
            }
            tag_sha=$(git rev-list -n 1 "$tag")
            test "$tag_sha" = "$GITHUB_SHA" || {
              echo "$tag already points to $tag_sha" >&2
              exit 1
            }
          fi

      - name: Authenticate with crates.io
        if: steps.registry.outputs.needs_publish == 'true' && vars.CRATES_IO_TRUSTED_PUBLISHING == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crate
        if: steps.registry.outputs.needs_publish == 'true'
        run: |
          test -n "$CARGO_REGISTRY_TOKEN" || {
            echo "No crates.io credential is configured" >&2
            exit 1
          }
          cargo +stable publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ vars.CRATES_IO_TRUSTED_PUBLISHING == 'true' && steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}

      - name: Verify published archive
        run: |
          archive=$(mktemp)
          url="https://crates.io/api/v1/crates/project-root-patch/$RELEASE_VERSION/download"
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error --location "$url" --output "$archive"; then
              break
            fi
            test "$attempt" -lt 24 || exit 1
            sleep 5
          done
          published_sha=$(tar -xOf "$archive" "project-root-patch-$RELEASE_VERSION/.cargo_vcs_info.json" | jq -r .git.sha1)
          test "$published_sha" = "$GITHUB_SHA"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$RELEASE_VERSION"
          if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git tag --annotate "$tag" --message "project-root-patch $RELEASE_VERSION"
            git push origin "$tag"
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --verify-tag --title "$tag" --generate-notes
          fi
