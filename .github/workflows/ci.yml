name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: rustup toolchain install stable --profile minimal
      - run: cargo +stable test --all-targets --locked

  quality:
    name: Lints, docs, and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: cargo +stable fmt --all --check
      - run: cargo +stable clippy --all-targets -- -D warnings
      - run: cargo +stable doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo +stable package --locked
      - name: Test packaged source
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "project-root-patch") | .version')
          cargo +stable test --manifest-path "target/package/project-root-patch-$version/Cargo.toml" --all-targets --locked

  msrv:
    name: Rust 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: rustup toolchain install 1.85.0 --profile minimal
      - run: cargo +1.85.0 check --all-targets --locked
